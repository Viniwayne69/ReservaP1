  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --ink: #151815;
      --ink-soft: #30362f;
      --muted: #636b60;
      --line: rgba(28, 33, 27, 0.13);
      --line-strong: rgba(28, 33, 27, 0.22);
      --panel: #d9ded5;
      --panel-deep: #c1c8be;
      --panel-soft: #e7ebe3;
      --carbon: #111411;
      --lime: #c8ff00;
      --lime-deep: #93c900;
      --glow: rgba(180, 232, 0, 0.18);
      --shadow: 0 18px 44px rgba(19, 23, 18, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Open Sans", Arial, sans-serif;
      background:
        linear-gradient(135deg, #b5bbb2 0%, #a5aca2 48%, #939b91 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0.28;
      background:
        linear-gradient(115deg, rgba(255, 255, 255, 0.14), transparent 30%),
        repeating-linear-gradient(112deg, transparent 0 42px, rgba(31, 35, 30, 0.055) 43px, transparent 45px);
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: auto 0 0;
      z-index: -1;
      height: 24vh;
      background: linear-gradient(0deg, rgba(22, 27, 21, 0.11), transparent);
      pointer-events: none;
    }

    button,
    input {
      font: inherit;
      max-width: 100%;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
    }

    .hidden {
      display: none !important;
    }

    .app {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(1rem, 3vw, 2rem);
      overflow-x: hidden;
    }

    .screen {
      width: min(760px, 100%);
      max-width: 100%;
    }

    #adminScreen {
      width: min(1120px, 100%);
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 20px;
      background: linear-gradient(145deg, rgba(228, 232, 224, 0.96), rgba(205, 212, 201, 0.98));
      box-shadow: var(--shadow), inset 0 1px rgba(255, 255, 255, 0.52);
      backdrop-filter: blur(12px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background: none;
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .login-card,
    .step-card,
    .success-card,
    .admin-card {
      display: grid;
      gap: 1rem;
      min-height: min(42rem, calc(100vh - 2rem));
      align-content: center;
      padding: clamp(1.25rem, 4vw, 2.4rem);
    }

    .login-card {
      text-align: center;
      min-height: auto;
      padding-block: clamp(2rem, 5vw, 3.1rem);
    }

    .logo-wrap {
      display: grid;
      justify-items: center;
      gap: 0.55rem;
      margin-bottom: 0.35rem;
    }

    .brand-logo {
      width: min(128px, 34vw);
      aspect-ratio: 1;
      border-radius: 50%;
      padding: 0.45rem;
      object-fit: cover;
      background: var(--carbon);
      border: 1px solid rgba(180, 232, 0, 0.54);
      box-shadow: 0 0 0 5px rgba(200, 255, 0, 0.035), 0 14px 30px rgba(0, 0, 0, 0.28);
    }

    .brand-logo.admin-trigger {
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .brand-logo.admin-trigger:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 0 6px rgba(200, 255, 0, 0.055), 0 16px 34px rgba(0, 0, 0, 0.32);
    }

    .brand-title {
      margin: 0;
      color: var(--ink);
      font-size: clamp(2.15rem, 8vw, 3.45rem);
      font-weight: 900;
      letter-spacing: 0;
      line-height: 0.92;
      text-transform: uppercase;
    }

    .brand-title span,
    .neon {
      color: var(--lime);
    }

    .brand-subtitle {
      display: inline-block;
      margin: 0;
      padding: 0;
      color: #b8ee00;
      font-size: clamp(1.05rem, 4vw, 1.55rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      line-height: 1;
      text-transform: uppercase;
      paint-order: stroke fill;
      -webkit-text-stroke: 0.4px var(--carbon);
      text-shadow: 0 1px 1px rgba(17, 20, 17, 0.48);
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    .hero-title,
    .admin-login-card h1 {
      margin-bottom: 0.3rem;
      color: var(--ink);
      font-size: clamp(1.95rem, 5vw, 2.65rem);
      line-height: 1.04;
      font-weight: 900;
      letter-spacing: 0;
    }

    .step-card h1,
    .success-card h1,
    .admin-card h1 {
      margin-bottom: 0.15rem;
      color: var(--ink);
      font-size: clamp(1.85rem, 4.5vw, 2.7rem);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: 0;
    }

    .lead {
      max-width: 32rem;
      margin: 0 auto;
      color: var(--muted);
      font-size: 0.98rem;
      font-weight: 700;
      line-height: 1.55;
    }

    .field {
      display: grid;
      gap: 0.45rem;
      text-align: left;
    }

    .field label {
      color: #33402b;
      font-size: 0.76rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input {
      width: 100%;
      min-height: 3.35rem;
      padding: 0.85rem 1rem;
      color: var(--ink);
      border: 1px solid rgba(49, 55, 47, 0.16);
      border-radius: 12px;
      background: rgba(241, 244, 238, 0.82);
      outline: none;
      transition: border 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    input:focus {
      border-color: rgba(147, 201, 0, 0.72);
      background: rgba(248, 250, 245, 0.96);
      box-shadow: 0 0 0 3px rgba(179, 230, 0, 0.14);
    }

    input::placeholder {
      color: #8f9789;
    }

    .button {
      min-height: 3.2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      padding: 0.82rem 1.05rem;
      border: 1px solid rgba(49, 55, 47, 0.17);
      border-radius: 12px;
      color: var(--ink-soft);
      background: rgba(224, 229, 221, 0.7);
      font-weight: 900;
      text-decoration: none;
      transition: transform 180ms ease, border 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
      border-color: rgba(63, 70, 59, 0.32);
      background: rgba(238, 241, 234, 0.9);
    }

    .button-primary {
      color: #f5f8f1;
      border: 1px solid rgba(176, 226, 0, 0.44);
      background: linear-gradient(135deg, #151914, #242b22);
      box-shadow: 0 10px 22px rgba(17, 20, 17, 0.18);
    }

    .button-primary i {
      color: var(--lime);
    }

    .button.is-loading i {
      animation: spin 780ms linear infinite;
    }

    .button-primary:hover {
      border-color: rgba(200, 255, 0, 0.62);
      background: linear-gradient(135deg, #10130f, #222920);
      box-shadow: 0 12px 26px rgba(17, 20, 17, 0.2);
    }

    .button-soft {
      color: var(--ink-soft);
      background: rgba(218, 223, 214, 0.5);
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      align-items: center;
      justify-content: space-between;
    }

    .section-brand {
      display: inline-flex;
      gap: 0.55rem;
      align-items: center;
      margin-bottom: 0.55rem;
      color: var(--ink);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .section-logo {
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      object-fit: cover;
      background: #111311;
      border: 1px solid rgba(200, 255, 0, 0.46);
      box-shadow: 0 5px 14px rgba(17, 20, 17, 0.14);
    }

    .progress {
      position: relative;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.45rem;
      margin: 0.15rem 0 0.7rem;
      padding: 0.25rem 0;
    }

    .progress::before {
      content: "";
      position: absolute;
      top: 1.2rem;
      left: 8%;
      right: 8%;
      height: 1px;
      background: rgba(49, 55, 47, 0.16);
    }

    .progress-item {
      position: relative;
      display: grid;
      gap: 0.4rem;
      justify-items: center;
      color: #687166;
      font-size: 0.62rem;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
    }

    .progress-item span {
      display: grid;
      width: 1.75rem;
      height: 1.75rem;
      place-items: center;
      color: #596255;
      border: 1px solid rgba(60, 67, 56, 0.18);
      border-radius: 50%;
      background: #dfe4da;
      box-shadow: 0 0 0 4px rgba(224, 229, 220, 0.72);
    }

    .progress-item.active,
    .progress-item.done {
      color: var(--ink);
    }

    .progress-item.active span,
    .progress-item.done span {
      color: #d8ff37;
      border-color: rgba(200, 255, 0, 0.48);
      background: var(--carbon);
      box-shadow: 0 0 0 4px rgba(200, 255, 0, 0.06), 0 6px 14px rgba(17, 20, 17, 0.14);
    }

    #stepTitle,
    .progress,
    #stepContent {
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .step-card.is-transitioning {
      pointer-events: none;
    }

    .step-card.is-transitioning #stepTitle,
    .step-card.is-transitioning .progress {
      opacity: 0.86;
    }

    #stepContent {
      will-change: opacity, transform;
    }

    #stepContent.step-exit-forward {
      opacity: 0;
      transform: translateY(10px);
    }

    #stepContent.step-exit-back {
      opacity: 0;
      transform: translateY(10px);
    }

    #stepContent.step-enter-forward {
      animation: stepEnter 420ms cubic-bezier(0.2, 0.82, 0.2, 1) both;
    }

    #stepContent.step-enter-back {
      animation: stepEnter 420ms cubic-bezier(0.2, 0.82, 0.2, 1) both;
    }

    #stepContent.step-enter-forward .lead,
    #stepContent.step-enter-forward .calendar-box,
    #stepContent.step-enter-forward .time-button,
    #stepContent.step-enter-forward .summary-list li,
    #stepContent.step-enter-forward .button,
    #stepContent.step-enter-back .lead,
    #stepContent.step-enter-back .calendar-box,
    #stepContent.step-enter-back .time-button,
    #stepContent.step-enter-back .summary-list li,
    #stepContent.step-enter-back .button {
      animation: cardDetailEnter 420ms cubic-bezier(0.2, 0.82, 0.2, 1) both;
    }

    #stepContent.step-enter-forward .calendar-box,
    #stepContent.step-enter-back .calendar-box {
      animation-delay: 90ms;
    }

    #stepContent.step-enter-forward .time-button:nth-child(1),
    #stepContent.step-enter-back .time-button:nth-child(1),
    #stepContent.step-enter-forward .summary-list li:nth-child(1),
    #stepContent.step-enter-back .summary-list li:nth-child(1) {
      animation-delay: 90ms;
    }

    #stepContent.step-enter-forward .time-button:nth-child(2),
    #stepContent.step-enter-back .time-button:nth-child(2),
    #stepContent.step-enter-forward .summary-list li:nth-child(2),
    #stepContent.step-enter-back .summary-list li:nth-child(2) {
      animation-delay: 135ms;
    }

    #stepContent.step-enter-forward .time-button:nth-child(3),
    #stepContent.step-enter-back .time-button:nth-child(3),
    #stepContent.step-enter-forward .summary-list li:nth-child(3),
    #stepContent.step-enter-back .summary-list li:nth-child(3) {
      animation-delay: 180ms;
    }

    #stepContent.step-enter-forward .time-button:nth-child(4),
    #stepContent.step-enter-back .time-button:nth-child(4),
    #stepContent.step-enter-forward .summary-list li:nth-child(4),
    #stepContent.step-enter-back .summary-list li:nth-child(4) {
      animation-delay: 225ms;
    }

    #stepContent.step-enter-forward .time-button:nth-child(n+5),
    #stepContent.step-enter-back .time-button:nth-child(n+5) {
      animation-delay: 270ms;
    }

    #stepContent.step-enter-forward .button,
    #stepContent.step-enter-back .button {
      animation-delay: 320ms;
    }

    @keyframes stepEnter {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes cardDetailEnter {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .calendar-box {
      overflow: hidden;
      border: 1px solid rgba(49, 55, 47, 0.12);
      border-radius: 16px;
      background: rgba(236, 240, 232, 0.5);
      box-shadow: inset 0 1px rgba(255, 255, 255, 0.32);
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.9rem;
      border-bottom: 1px solid rgba(49, 55, 47, 0.12);
      background: rgba(218, 224, 214, 0.56);
    }

    .calendar-title {
      color: var(--ink);
      font-weight: 900;
      text-transform: none;
    }

    .icon-button {
      display: inline-grid;
      width: 2.45rem;
      height: 2.45rem;
      place-items: center;
      color: var(--ink-soft);
      border: 1px solid rgba(49, 55, 47, 0.16);
      border-radius: 10px;
      background: rgba(237, 241, 233, 0.58);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.4rem;
      padding: 0.85rem;
    }

    .weekday,
    .day-button {
      display: grid;
      min-height: 2.5rem;
      place-items: center;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 900;
    }

    .weekday {
      color: #737b70;
      text-transform: uppercase;
    }

    .day-button {
      color: var(--ink-soft);
      border: 1px solid transparent;
      background: transparent;
    }

    .day-button.available {
      color: #20271e;
      border-color: rgba(50, 58, 47, 0.12);
      background: rgba(240, 243, 237, 0.72);
    }

    .day-button.selected,
    .day-button.available:hover {
      color: #d8ff37;
      border-color: rgba(176, 226, 0, 0.52);
      background: var(--carbon);
      box-shadow: 0 7px 16px rgba(17, 20, 17, 0.16);
    }

    .day-button.disabled {
      color: rgba(70, 77, 65, 0.45);
    }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.7rem;
    }

    .time-button {
      min-height: 3.15rem;
      color: var(--ink-soft);
      border: 1px solid rgba(50, 58, 47, 0.16);
      border-radius: 12px;
      background: rgba(240, 243, 237, 0.72);
      font-weight: 900;
    }

    .time-button:hover,
    .time-button.selected {
      color: #d8ff37;
      border-color: rgba(176, 226, 0, 0.52);
      background: var(--carbon);
      box-shadow: 0 7px 16px rgba(17, 20, 17, 0.16);
    }

    .time-button.busy {
      color: rgba(70, 77, 65, 0.48);
      border-color: rgba(73, 80, 68, 0.14);
      background: rgba(188, 195, 183, 0.5);
      text-decoration: line-through;
    }

    .summary-list {
      display: grid;
      gap: 0.7rem;
      padding: 0;
      margin: 0.3rem 0 0;
      list-style: none;
    }

    .summary-list li {
      display: flex;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem;
      border: 1px solid rgba(49, 55, 47, 0.11);
      border-radius: 12px;
      background: rgba(240, 243, 237, 0.68);
    }

    .summary-list span {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 750;
    }

    .summary-list strong {
      color: var(--ink);
      text-align: right;
    }

    .appointments-list,
    .admin-list {
      display: grid;
      gap: 0.75rem;
      margin-top: 0.35rem;
    }

    .admin-dashboard {
      display: grid;
      gap: 1rem;
    }

    .admin-metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.7rem;
    }

    .metric-card {
      padding: 0.9rem;
      border: 1px solid rgba(49, 55, 47, 0.11);
      border-radius: 14px;
      background: rgba(240, 243, 237, 0.68);
    }

    .metric-card span {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    .metric-card strong {
      display: block;
      margin-top: 0.25rem;
      color: var(--ink);
      font-size: 1.35rem;
      line-height: 1;
    }

    .admin-toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.75rem;
      align-items: center;
    }

    .admin-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      justify-content: flex-end;
    }

    .filter-button {
      min-height: 2.5rem;
      padding: 0.55rem 0.75rem;
      border-radius: 999px;
      font-size: 0.78rem;
    }

    .filter-button.active {
      color: #d8ff37;
      border-color: rgba(176, 226, 0, 0.52);
      background: var(--carbon);
    }

    .admin-appointment-card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 1rem;
      align-items: start;
      padding: 1rem;
      border: 1px solid rgba(49, 55, 47, 0.11);
      border-radius: 14px;
      background: rgba(240, 243, 237, 0.72);
    }

    .appointment-main {
      display: grid;
      gap: 0.7rem;
      min-width: 0;
    }

    .appointment-title {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 0.7rem;
      align-items: center;
      color: var(--ink);
      font-weight: 900;
    }

    .appointment-title strong {
      font-size: 1rem;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 1.5rem;
      padding: 0.25rem 0.5rem;
      color: #d8ff37;
      border-radius: 999px;
      background: var(--carbon);
      font-size: 0.66rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .appointment-details {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.55rem;
    }

    .detail-item {
      display: grid;
      gap: 0.15rem;
      min-width: 0;
      padding: 0.62rem;
      border: 1px solid rgba(49, 55, 47, 0.09);
      border-radius: 12px;
      background: rgba(248, 250, 245, 0.45);
    }

    .detail-item span {
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    .detail-item strong {
      overflow-wrap: anywhere;
      color: var(--ink);
      font-size: 0.9rem;
      line-height: 1.25;
    }

    .appointment-card {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.85rem;
      align-items: center;
      padding: 0.85rem;
      border: 1px solid rgba(49, 55, 47, 0.11);
      border-radius: 14px;

    .date-badge {

      min-height: 4.2rem;
      place-items: center;

      border: 1px dashed rgba(49, 55, 47, 0.2);
      border-radius: 16px;
      background: rgba(238, 241, 234, 0.5);
      text-align: center;
    }

    @media (max-width: 620px) {
      html,
      body {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }

      .app {
        padding: 0.75rem;
        align-items: center;
      }

      .screen {
        width: 100%;
      }

      .login-card,
      .step-card,
      .success-card,
      .admin-card {
        min-height: calc(100dvh - 1.5rem);
        border-radius: 18px;
        padding: 1rem;

      .login-card {
        min-height: auto;
        padding-block: 1.75rem;

      .time-grid {

        grid-template-columns: repeat(2, 1fr);
      }

      .admin-toolbar {
        grid-template-columns: 1fr;
      }

      .admin-filters {
        justify-content: flex-start;
      }

      .admin-appointment-card {
        grid-template-columns: 1fr;
      }

      .appointment-details {
        grid-template-columns: 1fr;
      }

      .progress-item {
        font-size: 0.5rem;
      }

      .brand-logo {
        width: min(112px, 34vw);
      }

      .brand-title {
        font-size: clamp(1.9rem, 11vw, 2.75rem);
      }

      .brand-subtitle {
        font-size: clamp(0.95rem, 4.5vw, 1.2rem);
      }

      .hero-title,
      .admin-login-card h1 {
        font-size: clamp(1.85rem, 7vw, 2.2rem);
      }

      .calendar-grid {
        gap: 0.26rem;
        padding: 0.58rem;
      }

      .weekday,
      .day-button {
        min-height: 2.15rem;
        border-radius: 9px;
      }

      .summary-list li {
        display: grid;
        gap: 0.2rem;
        align-items: start;
      }

      .summary-list strong {
        text-align: left;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="screen" id="loginScreen">
      <div class="card login-card">
        <div class="logo-wrap">
          <img class="brand-logo admin-trigger" id="adminLogoButton" src="assets/logop1veiculos.png" alt="Logo P1 Auto Recife" role="button" tabindex="0">
          <div>
            <h1 class="brand-title">P1</h1>
            <p class="brand-subtitle">Auto Recife</p>
          </div>
        </div>
        <div>
          <h1 class="hero-title">Reserve sua visita</h1>
        </div>
        <form id="loginForm">
          <div class="field">
            <label for="clientNameInput">Me informa seu nome e sobrenome</label>
            <div class="input-wrap">
              <input id="clientNameInput" autocomplete="name" placeholder="Digite seu nome" required>
            </div>
          </div>
          <button class="button button-primary" type="submit" style="width: 100%; margin-top: 1rem;">
            <i data-lucide="log-in"></i>
            Entrar
          </button>
        </form>

    </section>

    <section class="screen hidden" id="bookingScreen">
      <div class="card step-card">
        <div class="top-actions">
          <div>

        </div>
        <div class="progress" id="progress"></div>
        <div id="stepContent"></div>
      </div>
    </section>

    <section class="screen hidden" id="appointmentsScreen">
      <div class="card step-card">
        <div class="top-actions">
          <div>
            <div class="section-brand">
              <img class="section-logo" src="assets/logop1veiculos.png" alt="">
              <span>P1 Auto Recife</span>
            </div>
            <h1>Minhas visitas</h1>
          </div>
          <button class="button button-soft" type="button" data-go="calendar">
            <i data-lucide="arrow-left"></i>
            Voltar
          </button>
        </div>
        <div class="appointments-list" id="appointmentsList"></div>
      </div>
    </section>

    <section class="screen hidden" id="adminScreen">
      <div class="card admin-card">
        <div class="top-actions">
          <div>
            <div class="section-brand">
              <img class="section-logo" src="assets/logop1veiculos.png" alt="">
              <span>Painel P1</span>
            </div>
            <h1>Agenda da loja</h1>
          </div>
          <button class="button button-soft" type="button" data-go="login">
            <i data-lucide="arrow-left"></i>
            Voltar
          </button>
        </div>
        <div class="admin-list" id="adminList"></div>
      </div>
    </section>

    <section class="screen hidden" id="adminLoginScreen">
      <div class="card login-card admin-login-card">
        <img class="brand-logo admin-login-logo" src="assets/logop1veiculos.png" alt="Logo P1 Auto Recife">
        <div>
          <p class="section-brand" style="justify-content: center;">Acesso reservado</p>
          <h1>Painel da loja</h1>
          <p class="lead">Digite o PIN para acompanhar e organizar as visitas agendadas.</p>
        </div>
        <form class="admin-login-form" id="adminLoginForm">
          <div class="field">
            <label for="adminPinInput">PIN de acesso</label>
            <input id="adminPinInput" inputmode="numeric" autocomplete="off" type="password" placeholder="Digite o PIN" required>
          </div>
          <p class="admin-error" id="adminLoginError"></p>
          <button class="button button-primary" type="submit">
            <i data-lucide="lock-keyhole-open"></i>
            Entrar no painel
          </button>
          <button class="button button-soft" type="button" data-go="login">
            Voltar
          </button>
        </form>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import {
      addDoc,
      collection,
      deleteDoc,
      doc,
      getDocs,
      getFirestore,
      serverTimestamp,
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const clientKey = "p1Agenda_clientName";
    const appointmentKey = "p1Agenda_appointments";
    const adminPin = "1234";
    const firebaseConfig = {
      apiKey: "AIzaSyAdYi5G-PhDWzD9anZZL_76asUpcCzJg9Y",
      authDomain: "agendamentop1.firebaseapp.com",
      projectId: "agendamentop1",
      storageBucket: "agendamentop1.firebasestorage.app",
      messagingSenderId: "105298128598",
      appId: "1:105298128598:web:06f19fb3e6eaa2c44d2377"
    };
    const firebaseReady = !Object.values(firebaseConfig).some(value => value.includes("COLE_"));
    const firebaseApp = firebaseReady ? initializeApp(firebaseConfig) : null;
    const firestoreDb = firebaseReady ? getFirestore(firebaseApp) : null;
    const appointmentsCollection = "p1_appointments";

    const times = [
      "08:30", "09:00", "09:30", "10:00", "10:30", "11:00",
      "11:30", "13:30", "14:00", "14:30", "15:00", "15:30",
      "16:00", "16:30", "17:00", "17:30"
    ];

    const state = {
      clientName: "",
      step: 1,
      date: "",
      time: "",
      whatsapp: "",
      carPreference: "",
      calendar: new Date(),
      occupied: new Set()
    };

    const loginScreen = document.querySelector("#loginScreen");
    const bookingScreen = document.querySelector("#bookingScreen");
    const appointmentsScreen = document.querySelector("#appointmentsScreen");
    const adminScreen = document.querySelector("#adminScreen");
    const adminLoginScreen = document.querySelector("#adminLoginScreen");
    const loginForm = document.querySelector("#loginForm");
    const adminLoginForm = document.querySelector("#adminLoginForm");
    const adminPinInput = document.querySelector("#adminPinInput");
    const adminLoginError = document.querySelector("#adminLoginError");
    const adminLogoButton = document.querySelector("#adminLogoButton");
    const clientNameInput = document.querySelector("#clientNameInput");
    const stepTitle = document.querySelector("#stepTitle");
    const progress = document.querySelector("#progress");
    const stepContent = document.querySelector("#stepContent");
    const bookingCard = document.querySelector("#bookingScreen .step-card");
    const appointmentsList = document.querySelector("#appointmentsList");
    const adminList = document.querySelector("#adminList");
    let isStepTransitioning = false;
    let isConfirmingAppointment = false;
    let adminFilter = "all";
    let adminSearch = "";
    let adminSearchTimer = null;

    clientNameInput.value = localStorage.getItem(clientKey) || "";

    function refreshIcons() {
      if (window.lucide) {
        window.lucide.createIcons();
      }
    }

    function dateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function fromDateKey(value) {
      const parts = value.split("-").map(Number);
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function friendlyDate(value) {
      return fromDateKey(value).toLocaleDateString("pt-BR", {
        weekday: "long",
        day: "2-digit",
        month: "long"
      });
    }

    function firstName(name) {
      return name.trim().split(/\s+/)[0] || name;
    }

    function shortDate(value) {
      const date = fromDateKey(value);
      return {
        day: String(date.getDate()).padStart(2, "0"),
        month: date.toLocaleDateString("pt-BR", { month: "short" }).replace(".", "").toUpperCase()
      };
    }

    function isPastDate(date) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = new Date(date);
      target.setHours(0, 0, 0, 0);
      return target < today;
    }

    function isWorkingDay(date) {
      const day = date.getDay();
      return day >= 1 && day <= 6;
    }

    function isPastTime(day, time) {
      const parts = time.split(":").map(Number);
      const target = fromDateKey(day);
      target.setHours(parts[0], parts[1], 0, 0);
      return target < new Date();
    }

    function hasRemainingTime(date) {
      const key = dateKey(date);
      return times.some(time => !isPastTime(key, time));
    }

    function hasOpenTime(day, occupiedForDate) {
      return times.some(time => !isPastTime(day, time) && !occupiedForDate.has(time));
    }

    function readLocalAppointments() {
      try {
        return JSON.parse(localStorage.getItem(appointmentKey) || "[]").map(normalizeAppointment);
      } catch {
        return [];
      }
    }

    function writeLocalAppointments(items) {
      localStorage.setItem(appointmentKey, JSON.stringify(items));
    }

    function normalizeAppointment(item) {
      return {
        id: item.id,
        clientName: item.clientName,
        whatsapp: item.whatsapp || "",
        carPreference: item.carPreference || "",
        date: item.date,
        time: item.time,
        status: item.status || "confirmado",
        createdAt: item.createdAt || item.created_at || item.createdAt
      };
    }

    async function readAppointments() {
      if (!firestoreDb) {
        return readLocalAppointments();
      }

      try {
        const snapshot = await withTimeout(
          getDocs(collection(firestoreDb, appointmentsCollection)),
          3500,
          "Tempo esgotado ao buscar agendamentos"
        );

        return snapshot.docs
          .map(doc => normalizeAppointment({ id: doc.id, ...doc.data() }))
          .sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));
      } catch (error) {
        console.error("Erro ao buscar agendamentos no Firebase:", error);
        return readLocalAppointments();
      }
    }

    async function createAppointment(item) {
      if (!firestoreDb) {
        const items = readLocalAppointments();
        items.push(item);
        writeLocalAppointments(items);
        return item;
      }

      try {
        const docRef = await addDoc(collection(firestoreDb, appointmentsCollection), {
          clientName: item.clientName,
          whatsapp: item.whatsapp,
          carPreference: item.carPreference,
          date: item.date,
          time: item.time,
          status: item.status,
          createdAt: serverTimestamp()
        });

        return { ...item, id: docRef.id };
      } catch (error) {
        console.error("Erro ao salvar agendamento no Firebase:", error);
        if (error.message !== "Horário indisponível") {
          alert("Não foi possível salvar esse agendamento agora. Tente novamente em alguns instantes.");
        }
        throw error;
      }
    }

    async function deleteAppointment(id) {
      if (!id) {
        throw new Error("Reserva sem identificador");
      }

      if (!firestoreDb) {
        const items = readLocalAppointments().filter(item => item.id !== id);
        writeLocalAppointments(items);
        return;
      }

      await withTimeout(
        deleteDoc(doc(firestoreDb, appointmentsCollection, id)),
        3500,
        "Tempo esgotado ao excluir reserva"
      );
    }

    function showOnly(screen) {
      [loginScreen, bookingScreen, appointmentsScreen, adminScreen, adminLoginScreen].forEach(item => item.classList.add("hidden"));
      screen.classList.remove("hidden");
      refreshIcons();
    }

    function renderProgress() {
      const labels = ["Dia", "Horário", "WhatsApp", "Carro", "Confirmação"];
      progress.innerHTML = labels.map((label, index) => {
        const number = index + 1;
        const active = number === state.step ? "active" : number < state.step ? "done" : "";
        return `<div class="progress-item ${active}"><span>${number}</span>${label}</div>`;
      }).join("");
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function withTimeout(promise, ms, message) {
      return Promise.race([
        promise,
        new Promise((_, reject) => {
          setTimeout(() => reject(new Error(message)), ms);
        })
      ]);
    }

    async function transitionToStep(nextStep) {
      if (isStepTransitioning) {
        return;
      }

      if (nextStep === state.step) {
        await renderStep();
        return;
      }

      const direction = nextStep > state.step ? "forward" : "back";
      isStepTransitioning = true;
      bookingCard.classList.add("is-transitioning");
      stepContent.classList.remove("step-enter-forward", "step-enter-back", "step-exit-forward", "step-exit-back");
      stepContent.classList.add(direction === "forward" ? "step-exit-forward" : "step-exit-back");

      await delay(180);
      state.step = nextStep;
      await renderStep({ direction });
      await delay(520);
      stepContent.classList.remove("step-enter-forward", "step-enter-back");
      bookingCard.classList.remove("is-transitioning");
      isStepTransitioning = false;
    }

    async function renderStep(options = {}) {
      showOnly(bookingScreen);
      renderProgress();

      if (state.step === 1) {
        await renderCalendar();
      }

      if (state.step === 2) {
        await renderTimes();
      }

      if (state.step === 3) {
        renderWhatsApp();
      }

      if (state.step === 4) {
        renderCarPreference();
      }

      if (state.step === 5) {
        renderConfirmation();
      }

      refreshIcons();

      if (options.direction) {
        stepContent.classList.remove("step-exit-forward", "step-exit-back");
        stepContent.classList.add(options.direction === "forward" ? "step-enter-forward" : "step-enter-back");
      }
    }

    async function renderCalendar(options = {}) {
      stepTitle.textContent = "Escolha seu dia";
      const appointments = options.appointments || readLocalAppointments();
      const occupiedByDate = appointments.reduce((map, item) => {
        if (item.status === "cancelado") {
          return map;
        }

        if (!map.has(item.date)) {
          map.set(item.date, new Set());
        }

        map.get(item.date).add(item.time);
        return map;
      }, new Map());
      const current = new Date(state.calendar.getFullYear(), state.calendar.getMonth(), 1);
      const firstWeekday = current.getDay();
      const days = new Date(current.getFullYear(), current.getMonth() + 1, 0).getDate();
      const cells = [];

      for (let index = 0; index < firstWeekday; index += 1) {
        cells.push(`<span class="day-button disabled"></span>`);
      }

      for (let day = 1; day <= days; day += 1) {
        const date = new Date(current.getFullYear(), current.getMonth(), day);
        const key = dateKey(date);
        const occupiedForDate = occupiedByDate.get(key) || new Set();
        const available = !isPastDate(date) && isWorkingDay(date) && hasOpenTime(key, occupiedForDate);
        const selected = state.date === key;
        cells.push(`
          <button class="day-button ${available ? "available" : "disabled"} ${selected ? "selected" : ""}" type="button" ${available ? "" : "disabled"} data-day="${key}">
            ${day}
          </button>
        `);
      }

      stepContent.innerHTML = `
        <p class="lead" style="margin-bottom: 1rem;">Olá ${firstName(state.clientName)}! Vamos reservar o melhor dia para sua visita.</p>
        <div class="calendar-box">
          <div class="calendar-head">
            <button class="icon-button" type="button" data-month="-1" aria-label="Mês anterior"><i data-lucide="chevron-left"></i></button>
            <strong class="calendar-title">${current.toLocaleDateString("pt-BR", { month: "long", year: "numeric" })}</strong>
            <button class="icon-button" type="button" data-month="1" aria-label="Próximo mês"><i data-lucide="chevron-right"></i></button>
          </div>
          <div class="calendar-grid">
            ${["D", "S", "T", "Q", "Q", "S", "S"].map(day => `<span class="weekday">${day}</span>`).join("")}
            ${cells.join("")}
          </div>
        </div>
        <button class="button button-soft" type="button" data-view-appointments style="width: 100%; margin-top: 1rem;">
          <i data-lucide="calendar-days"></i>
          Ver minhas visitas
        </button>
      `;

      refreshIcons();

      stepContent.querySelectorAll("[data-month]").forEach(button => {
        button.addEventListener("click", () => {
          state.calendar = new Date(state.calendar.getFullYear(), state.calendar.getMonth() + Number(button.dataset.month), 1);
          renderStep();
        });
      });

      stepContent.querySelectorAll("[data-day]").forEach(button => {
        button.addEventListener("click", () => {
          state.date = button.dataset.day;
          transitionToStep(2);
        });
      });

      if (options.refreshRemote === false || !firestoreDb) {
        return;
      }

      readAppointments().then(remoteAppointments => {
        if (state.step !== 1) {
          return;
        }

        renderCalendar({
          appointments: remoteAppointments,
          refreshRemote: false
        });
      });
    }

    async function loadOccupiedTimes() {
      const items = await readAppointments();
      state.occupied = new Set(items.filter(item => item.date === state.date && item.status !== "cancelado").map(item => item.time));
    }

    async function renderTimes() {
      stepTitle.textContent = "Escolha seu horário";
      await loadOccupiedTimes();
      stepContent.innerHTML = `
        <p class="lead" style="margin-bottom: 1rem;">Vamos separar esse momento para te receber com calma.</p>
        <div class="time-grid">
          ${times.map(time => {
            const busy = state.occupied.has(time) || isPastTime(state.date, time);
            const selected = state.time === time;
            return `<button class="time-button ${busy ? "busy" : ""} ${selected ? "selected" : ""}" type="button" ${busy ? "disabled" : ""} data-time="${time}">${time}</button>`;
          }).join("")}
        </div>
        <button class="button button-soft" type="button" data-back="1" style="width: 100%; margin-top: 1rem;">
          <i data-lucide="arrow-left"></i>
          Voltar para o dia
        </button>
      `;

      stepContent.querySelectorAll("[data-time]").forEach(button => {
        button.addEventListener("click", () => {
          state.time = button.dataset.time;
          transitionToStep(3);
        });
      });
    }

    function renderWhatsApp() {
      stepTitle.textContent = "Informe seu WhatsApp";
      stepContent.innerHTML = `
        <p class="lead" style="margin-bottom: 1rem;">Informe o número que a equipe da P1 pode usar para confirmar sua visita.</p>
        <form id="whatsappForm" class="field">
          <label for="whatsappInput">WhatsApp</label>
          <input id="whatsappInput" type="tel" inputmode="tel" autocomplete="tel" placeholder="Ex: 81 99999-9999" value="${state.whatsapp}" required>
          <button class="button button-primary" type="submit" style="width: 100%; margin-top: 1rem;">
            <i data-lucide="arrow-right"></i>
            Continuar
          </button>
          <button class="button button-soft" type="button" data-back="2" style="width: 100%; margin-top: 0.7rem;">
            <i data-lucide="arrow-left"></i>
            Voltar para horário
          </button>
        </form>
      `;

      const whatsappForm = stepContent.querySelector("#whatsappForm");
      const whatsappInput = stepContent.querySelector("#whatsappInput");
      whatsappForm.addEventListener("submit", event => {
        event.preventDefault();
        const value = whatsappInput.value.trim();
        const digits = value.replace(/\D/g, "");

        if (digits.length < 10) {
          whatsappInput.focus();
          return;
        }

        state.whatsapp = value;
        transitionToStep(4);
      });
    }

    function renderCarPreference() {
      stepTitle.textContent = "Carro de preferência";
      stepContent.innerHTML = `
        <p class="lead" style="margin-bottom: 1rem;">Conte qual carro você quer ver, pode ser modelo, estilo, faixa de valor ou uma ideia do que procura.</p>
        <form id="carPreferenceForm" class="field">
          <label for="carPreferenceInput">Carro de preferência</label>
          <input id="carPreferenceInput" autocomplete="off" placeholder="Ex: Corolla, Onix, SUV, automático" value="${state.carPreference}" required>
          <button class="button button-primary" type="submit" style="width: 100%; margin-top: 1rem;">
            <i data-lucide="arrow-right"></i>
            Continuar
          </button>
          <button class="button button-soft" type="button" data-back="3" style="width: 100%; margin-top: 0.7rem;">
            <i data-lucide="arrow-left"></i>
            Voltar para WhatsApp
          </button>
        </form>
      `;

      const carPreferenceForm = stepContent.querySelector("#carPreferenceForm");
      const carPreferenceInput = stepContent.querySelector("#carPreferenceInput");
      carPreferenceForm.addEventListener("submit", event => {
        event.preventDefault();
        const value = carPreferenceInput.value.trim();

        if (!value) {
          carPreferenceInput.focus();
          return;
        }

        state.carPreference = value;
        transitionToStep(5);
      });
    }

    function renderConfirmation() {
      isConfirmingAppointment = false;
      stepTitle.textContent = "Sua visita está quase reservada";
      stepContent.innerHTML = `
        <p class="lead" style="margin-bottom: 1rem;">Confira os detalhes e deixe sua visita reservada.</p>
        <ul class="summary-list">
          <li><span>Cliente</span><strong>${firstName(state.clientName)}</strong></li>
          <li><span>WhatsApp</span><strong>${state.whatsapp}</strong></li>
          <li><span>Carro</span><strong>${state.carPreference}</strong></li>
          <li><span>Data</span><strong>${friendlyDate(state.date)}</strong></li>
          <li><span>Horário</span><strong>${state.time}</strong></li>
          <li><span>Local</span><strong>Av. Visconde de Albuquerque, 422</strong></li>
        </ul>
        <button class="button button-primary" type="button" data-confirm style="width: 100%; margin-top: 1rem;">
          <i data-lucide="check"></i>
          Confirmar minha visita
        </button>
        <button class="button button-soft" type="button" data-back="4" style="width: 100%; margin-top: 0.7rem;">
          <i data-lucide="arrow-left"></i>
          Voltar para carro
        </button>
      `;
    }

    async function confirmAppointment() {
      if (isConfirmingAppointment) {
        return;
      }

      if (state.occupied.has(state.time)) {
        transitionToStep(2);
        return;
      }

      const confirmButton = stepContent.querySelector("[data-confirm]");
      isConfirmingAppointment = true;

      if (confirmButton) {
        confirmButton.disabled = true;
        confirmButton.innerHTML = `<i data-lucide="loader-circle"></i> Reservando...`;
        refreshIcons();
      }

      try {
        await createAppointment({
          id: crypto.randomUUID(),
          clientName: state.clientName,
          whatsapp: state.whatsapp,
          carPreference: state.carPreference,
          date: state.date,
          time: state.time,
          status: "confirmado",
          createdAt: new Date().toISOString()
        });
        isConfirmingAppointment = false;
        renderSuccess();
      } catch {
        isConfirmingAppointment = false;
        transitionToStep(2);
      }
    }

    function renderSuccess() {
      progress.innerHTML = ["Dia", "Horário", "WhatsApp", "Carro", "Confirmação"].map((label, index) => `<div class="progress-item done"><span>${index + 1}</span>${label}</div>`).join("");
      stepTitle.textContent = "Visita reservada";
      stepContent.innerHTML = `
        <ul class="summary-list">
          <li><span>Cliente</span><strong>${firstName(state.clientName)}</strong></li>
          <li><span>WhatsApp</span><strong>${state.whatsapp}</strong></li>
          <li><span>Carro</span><strong>${state.carPreference}</strong></li>
          <li><span>Data</span><strong>${friendlyDate(state.date)}</strong></li>
          <li><span>Horário</span><strong>${state.time}</strong></li>
        </ul>
        <button class="button button-primary" type="button" data-new style="width: 100%; margin-top: 1rem;">
          <i data-lucide="calendar-plus"></i>
          Refazer Agendamento
        </button>
      `;
      refreshIcons();
    }

    async function renderAppointments() {
      showOnly(appointmentsScreen);
      const today = dateKey(new Date());
      const items = (await readAppointments())
        .filter(item => item.clientName.toLowerCase() === state.clientName.toLowerCase() && item.date >= today)
        .sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));

      if (!items.length) {
        appointmentsList.innerHTML = `<div class="empty-state">Você ainda não possui visitas marcadas.</div>`;
        return;
      }

      appointmentsList.innerHTML = items.map(item => {
        const date = shortDate(item.date);
        return `
          <article class="appointment-card">
            <div class="date-badge">${date.day}<small>${date.month}</small></div>
            <div>
              <strong>${item.time}</strong>
              <p style="margin: 0.25rem 0 0; color: #596254;">${friendlyDate(item.date)}</p>
            </div>
          </article>
        `;
      }).join("");
      refreshIcons();
    }

    async function renderAdmin() {
      showOnly(adminScreen);
      const items = (await readAppointments()).sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));
      const today = dateKey(new Date());
      const tomorrowDate = new Date();
      tomorrowDate.setDate(tomorrowDate.getDate() + 1);
      const tomorrow = dateKey(tomorrowDate);
      const weekEnd = new Date();
      weekEnd.setDate(weekEnd.getDate() + 7);
      const weekEndKey = dateKey(weekEnd);
      const upcomingItems = items.filter(item => item.date >= today);
      const todayItems = items.filter(item => item.date === today);
      const tomorrowItems = items.filter(item => item.date === tomorrow);
      const weekItems = items.filter(item => item.date >= today && item.date <= weekEndKey);
      const filteredItems = items.filter(item => {
        const text = `${item.clientName} ${item.whatsapp} ${item.carPreference} ${item.date} ${item.time}`.toLowerCase();
        const matchesSearch = !adminSearch || text.includes(adminSearch.toLowerCase());
        const matchesFilter =
          adminFilter === "all" ||
          (adminFilter === "today" && item.date === today) ||
          (adminFilter === "tomorrow" && item.date === tomorrow) ||
          (adminFilter === "week" && item.date >= today && item.date <= weekEndKey);

        return matchesSearch && matchesFilter;
      });

      const filterButton = (filter, label) => `
        <button class="button button-soft filter-button ${adminFilter === filter ? "active" : ""}" type="button" data-admin-filter="${filter}">
          ${label}
        </button>
      `;

      if (!items.length) {
        adminList.innerHTML = `
          <div class="admin-dashboard">
            <div class="admin-metrics">
              <div class="metric-card"><span>Hoje</span><strong>0</strong></div>
              <div class="metric-card"><span>Amanhã</span><strong>0</strong></div>
              <div class="metric-card"><span>Semana</span><strong>0</strong></div>
              <div class="metric-card"><span>Total ativo</span><strong>0</strong></div>
            </div>
            <div class="empty-state">Nenhuma visita marcada ainda.</div>
          </div>
        `;
        return;
      }

      adminList.innerHTML = `
        <div class="admin-dashboard">
          <div class="admin-metrics">
            <div class="metric-card"><span>Hoje</span><strong>${todayItems.length}</strong></div>
            <div class="metric-card"><span>Amanhã</span><strong>${tomorrowItems.length}</strong></div>
            <div class="metric-card"><span>Semana</span><strong>${weekItems.length}</strong></div>
            <div class="metric-card"><span>Total ativo</span><strong>${upcomingItems.length}</strong></div>
          </div>
          <div class="admin-toolbar">
            <div class="field">
              <label for="adminSearchInput">Buscar cliente</label>
              <input id="adminSearchInput" type="search" autocomplete="off" placeholder="Nome, WhatsApp ou carro" value="${adminSearch}">
            </div>
            <div class="admin-filters">
              ${filterButton("all", "Todos")}
              ${filterButton("today", "Hoje")}
              ${filterButton("tomorrow", "Amanhã")}
              ${filterButton("week", "7 dias")}
            </div>
          </div>
          <div class="admin-list">
            ${filteredItems.length ? filteredItems.map(item => {
        const date = shortDate(item.date);
        return `
          <article class="admin-appointment-card">
            <div class="date-badge">${date.day}<small>${date.month}</small></div>
            <div class="appointment-main">
              <div class="appointment-title">
                <strong>${item.time}, ${item.clientName}</strong>
                <span class="status-pill">Confirmado</span>
              </div>
              <div class="appointment-details">
                <div class="detail-item"><span>Data</span><strong>${friendlyDate(item.date)}</strong></div>
                <div class="detail-item"><span>WhatsApp</span><strong>${item.whatsapp || "Não informado"}</strong></div>
                <div class="detail-item"><span>Carro de preferência</span><strong>${item.carPreference || "Não informado"}</strong></div>
                <div class="detail-item"><span>Horário</span><strong>${item.time}</strong></div>
              </div>
            </div>
            <div class="admin-actions">
              <button class="button danger-button" type="button" data-delete-appointment="${item.id}">
                <i data-lucide="trash-2"></i>
                Excluir
              </button>
            </div>
          </article>
        `;
            }).join("") : `<div class="empty-state">Nenhuma visita encontrada com esse filtro.</div>`}
          </div>
        </div>
      `;
      refreshIcons();
    }

    loginForm.addEventListener("submit", event => {
      event.preventDefault();
      const name = clientNameInput.value.trim();
      if (!name) {
        return;
      }

      state.clientName = name;
      localStorage.setItem(clientKey, name);
      state.step = 1;
      state.date = "";
      state.time = "";
      state.whatsapp = "";
      state.carPreference = "";
      renderStep();
    });

    adminLogoButton.addEventListener("click", () => {
      adminPinInput.value = "";
      adminLoginError.textContent = "";
      showOnly(adminLoginScreen);
      adminPinInput.focus();
    });

    adminLogoButton.addEventListener("keydown", event => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        adminLogoButton.click();
      }
    });

    adminLoginForm.addEventListener("submit", event => {
      event.preventDefault();

      if (adminPinInput.value.trim() !== adminPin) {
        adminLoginError.textContent = "PIN incorreto. Tente novamente.";
        adminPinInput.select();
        return;
      }

      adminLoginError.textContent = "";
      renderAdmin();
    });

    stepContent.addEventListener("click", event => {
      const back = event.target.closest("[data-back]");
      const confirm = event.target.closest("[data-confirm]");
      const viewAppointments = event.target.closest("[data-view-appointments]");
      const newButton = event.target.closest("[data-new]");

      if (back) {
        transitionToStep(Number(back.dataset.back));
      }

      if (confirm) {
        confirmAppointment();
      }

      if (viewAppointments) {
        renderAppointments();
      }

      if (newButton) {
        state.date = "";
        state.time = "";
        state.whatsapp = "";
        state.carPreference = "";
        transitionToStep(1);
      }
    });

    document.addEventListener("input", event => {
      if (event.target.matches("#adminSearchInput")) {
        adminSearch = event.target.value.trim();
        renderAdmin();
      }
    });

    document.addEventListener("click", event => {
      const deleteButton = event.target.closest("[data-delete-appointment]");
      const adminFilterButton = event.target.closest("[data-admin-filter]");

      if (adminFilterButton) {
        adminFilter = adminFilterButton.dataset.adminFilter;
        renderAdmin();
        return;
      }

      if (deleteButton) {
        const appointmentCard = deleteButton.closest(".admin-appointment-card");
        deleteButton.disabled = true;
        deleteButton.classList.add("is-loading");
        deleteButton.innerHTML = `<i data-lucide="loader-circle"></i> Excluindo...`;
        refreshIcons();
        appointmentCard?.remove();

        deleteAppointment(deleteButton.dataset.deleteAppointment)
          .then(renderAdmin)
          .catch(error => {
            console.error("Erro ao excluir reserva:", error);
            const message = error.code === "permission-denied"
              ? "O Firebase ainda não permite excluir reservas. Publique as regras do Firestore com allow delete."
              : "Não foi possível excluir esta reserva agora.";
            alert(message);
            renderAdmin();
          });
        return;
      }

      const go = event.target.closest("[data-go]");
      if (!go) {
        return;
      }

      if (go.dataset.go === "login") {
        showOnly(loginScreen);
      }

      if (go.dataset.go === "calendar") {
        state.step = 1;
        renderStep();
      }
    });

    showOnly(loginScreen);
    refreshIcons();
  </script>
</body>
</html>
