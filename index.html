<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>P1 Auto Recife | Agendamento</title>
  <meta name="description" content="Agende sua visita presencial na P1 Auto Recife escolhendo apenas dia e horário.">
  <meta name="theme-color" content="#9da39b">
  <link rel="icon" type="image/png" href="assets/logop1veiculos.png">
  <link rel="apple-touch-icon" href="assets/logop1veiculos.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="canonical" href="https://agendamentop1.vercel.app/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://agendamentop1.vercel.app/">
  <meta property="og:site_name" content="P1 Auto Recife">
  <meta property="og:title" content="Agende sua visita | P1 Auto Recife">
  <meta property="og:description" content="Reserve seu dia e horário para visitar a P1 Auto Recife.">
  <meta property="og:image" content="https://agendamentop1.vercel.app/assets/whatsapp-preview-p1-v2.jpg">
  <meta property="og:image:secure_url" content="https://agendamentop1.vercel.app/assets/whatsapp-preview-p1-v2.jpg">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Agende sua visita na P1 Auto Recife">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Agende sua visita | P1 Auto Recife">
  <meta name="twitter:description" content="Reserve seu dia e horário para visitar a P1 Auto Recife.">
  <meta name="twitter:image" content="https://agendamentop1.vercel.app/assets/whatsapp-preview-p1-v2.jpg">
  <link rel="image_src" href="https://agendamentop1.vercel.app/assets/whatsapp-preview-p1-v2.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --ink: #151815;
      --ink-soft: #30362f;
      --muted: #636b60;
      --line: rgba(28, 33, 27, 0.13);
      --line-strong: rgba(28, 33, 27, 0.22);
      --panel: #d9ded5;
      --panel-deep: #c1c8be;
      --panel-soft: #e7ebe3;
      --carbon: #111411;
      --lime: #c8ff00;
      --lime-deep: #93c900;
      --glow: rgba(200, 255, 0, 0.24);
      --shadow: 0 24px 70px rgba(19, 23, 18, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Open Sans", Arial, sans-serif;
      background:
        radial-gradient(circle at 22% 12%, rgba(255, 255, 255, 0.36), transparent 18rem),
        radial-gradient(circle at 82% 78%, rgba(200, 255, 0, 0.12), transparent 20rem),
        linear-gradient(135deg, #b7bdb5 0%, #9fa79d 48%, #848d83 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0.5;
      background:
        linear-gradient(115deg, rgba(255, 255, 255, 0.18), transparent 28%),
        repeating-linear-gradient(112deg, transparent 0 38px, rgba(31, 35, 30, 0.08) 39px, transparent 41px),
        radial-gradient(circle at 50% 50%, rgba(15, 18, 14, 0.16), transparent 32rem);
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: auto 0 0;
      z-index: -1;
      height: 30vh;
      background: linear-gradient(0deg, rgba(22, 27, 21, 0.18), transparent);
      pointer-events: none;
    }

    button,
    input {
      font: inherit;
      max-width: 100%;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
    }

    .hidden {
      display: none !important;
    }

    .app {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(1rem, 3vw, 2rem);
      overflow-x: hidden;
    }

    .screen {
      width: min(760px, 100%);
      max-width: 100%;
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 22px;
      background:
        linear-gradient(145deg, rgba(232, 236, 228, 0.94), rgba(196, 204, 193, 0.98)),
        radial-gradient(circle at 88% 0, rgba(200, 255, 0, 0.08), transparent 16rem);
      box-shadow: var(--shadow), inset 0 1px rgba(255, 255, 255, 0.56);
      backdrop-filter: blur(18px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        linear-gradient(112deg, transparent 0 62%, rgba(17, 20, 17, 0.06) 62.2% 63%, transparent 63.2%),
        radial-gradient(circle at 84% 18%, rgba(200, 255, 0, 0.12), transparent 12rem);
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .login-card,
    .step-card,
    .success-card,
    .admin-card {
      display: grid;
      gap: 1rem;
      min-height: min(42rem, calc(100vh - 2rem));
      align-content: center;
      padding: clamp(1.25rem, 4vw, 2.4rem);
    }

    .login-card {
      text-align: center;
    }

    .logo-wrap {
      display: grid;
      justify-items: center;
      gap: 0.72rem;
      margin-bottom: 0.55rem;
    }

    .brand-logo {
      width: min(152px, 40vw);
      aspect-ratio: 1;
      border-radius: 50%;
      padding: 0.45rem;
      object-fit: cover;
      background: var(--carbon);
      border: 1px solid rgba(200, 255, 0, 0.62);
      box-shadow: 0 0 0 7px rgba(200, 255, 0, 0.05), 0 20px 44px rgba(0, 0, 0, 0.38);
    }

    .brand-logo.admin-trigger {
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .brand-logo.admin-trigger:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 0 8px rgba(200, 255, 0, 0.08), 0 24px 54px rgba(0, 0, 0, 0.4);
    }

    .brand-title {
      margin: 0;
      color: var(--ink);
      font-size: clamp(2.15rem, 8vw, 3.45rem);
      font-weight: 900;
      letter-spacing: 0;
      line-height: 0.92;
      text-transform: uppercase;
    }

    .brand-title span,
    .neon {
      color: var(--lime);
    }

    .brand-subtitle {
      display: inline-block;
      margin: 0;
      padding: 0;
      color: var(--lime);
      font-size: clamp(1.05rem, 4vw, 1.55rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      line-height: 1;
      text-transform: uppercase;
      paint-order: stroke fill;
      -webkit-text-stroke: 0.4px var(--carbon);
      text-shadow:
        0 1px 1px rgba(17, 20, 17, 0.72),
        0 0 1px rgba(17, 20, 17, 0.8);
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    .hero-title,
    .admin-login-card h1 {
      margin-bottom: 0.3rem;
      color: var(--ink);
      font-size: clamp(1.95rem, 5vw, 2.65rem);
      line-height: 1.04;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .step-card h1,
    .success-card h1,
    .admin-card h1 {
      margin-bottom: 0.15rem;
      color: var(--ink);
      font-size: clamp(1.85rem, 4.5vw, 2.7rem);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.018em;
    }

    .lead {
      max-width: 32rem;
      margin: 0 auto;
      color: var(--muted);
      font-size: 0.98rem;
      font-weight: 700;
      line-height: 1.55;
    }

    .field {
      display: grid;
      gap: 0.45rem;
      text-align: left;
    }

    .field label {
      color: #33402b;
      font-size: 0.76rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input {
      width: 100%;
      min-height: 3.35rem;
      padding: 0.85rem 1rem;
      color: var(--ink);
      border: 1px solid rgba(49, 55, 47, 0.18);
      border-radius: 14px;
      background: rgba(238, 241, 234, 0.82);
      outline: none;
      transition: border 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    input:focus {
      border-color: rgba(147, 201, 0, 0.72);
      background: rgba(248, 250, 245, 0.96);
      box-shadow: 0 0 0 4px rgba(200, 255, 0, 0.12);
    }

    input::placeholder {
      color: #8f9789;
    }

    .button {
      min-height: 3.2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      padding: 0.82rem 1.05rem;
      border: 1px solid rgba(49, 55, 47, 0.17);
      border-radius: 14px;
      color: var(--ink-soft);
      background: rgba(225, 229, 220, 0.74);
      font-weight: 900;
      text-decoration: none;
      transition: transform 180ms ease, border 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
      border-color: rgba(63, 70, 59, 0.32);
      background: rgba(238, 241, 234, 0.9);
    }

    .button-primary {
      color: #f5f8f1;
      border: 1px solid rgba(200, 255, 0, 0.44);
      background:
        linear-gradient(135deg, rgba(200, 255, 0, 0.16), transparent 34%),
        linear-gradient(135deg, #171b16, #2a3028);
      box-shadow: 0 18px 42px rgba(17, 20, 17, 0.26), 0 0 0 4px rgba(200, 255, 0, 0.04);
    }

    .button-primary i {
      color: var(--lime);
    }

    .button-primary:hover {
      border-color: rgba(200, 255, 0, 0.62);
      background:
        linear-gradient(135deg, rgba(200, 255, 0, 0.22), transparent 34%),
        linear-gradient(135deg, #111411, #262d24);
      box-shadow: 0 22px 52px rgba(17, 20, 17, 0.3), 0 0 0 5px rgba(200, 255, 0, 0.06);
    }

    .button-soft {
      color: var(--ink-soft);
      background: rgba(218, 223, 214, 0.56);
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      align-items: center;
      justify-content: space-between;
    }

    .section-brand {
      display: inline-flex;
      gap: 0.55rem;
      align-items: center;
      margin-bottom: 0.55rem;
      color: var(--ink);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .section-logo {
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      object-fit: cover;
      background: #111311;
      border: 1px solid rgba(200, 255, 0, 0.46);
      box-shadow: 0 6px 18px rgba(17, 20, 17, 0.18);
    }

    .progress {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.45rem;
      margin: 0.25rem 0 0.6rem;
      padding: 0.25rem 0;
    }

    .progress::before {
      content: "";
      position: absolute;
      top: 1.2rem;
      left: 10%;
      right: 10%;
      height: 1px;
      background: rgba(49, 55, 47, 0.16);
    }

    .progress-item {
      position: relative;
      display: grid;
      gap: 0.4rem;
      justify-items: center;
      color: #687166;
      font-size: 0.68rem;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
    }

    .progress-item span {
      display: grid;
      width: 1.9rem;
      height: 1.9rem;
      place-items: center;
      color: #596255;
      border: 1px solid rgba(60, 67, 56, 0.18);
      border-radius: 50%;
      background: #dfe4da;
      box-shadow: 0 0 0 5px rgba(224, 229, 220, 0.82);
    }

    .progress-item.active,
    .progress-item.done {
      color: var(--ink);
    }

    .progress-item.active span,
    .progress-item.done span {
      color: var(--lime);
      border-color: rgba(200, 255, 0, 0.48);
      background: var(--carbon);
      box-shadow: 0 0 0 5px rgba(200, 255, 0, 0.08), 0 8px 18px rgba(17, 20, 17, 0.16);
    }

    .calendar-box {
      overflow: hidden;
      border: 1px solid rgba(49, 55, 47, 0.12);
      border-radius: 18px;
      background: rgba(232, 236, 228, 0.56);
      box-shadow: inset 0 1px rgba(255, 255, 255, 0.34);
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.9rem;
      border-bottom: 1px solid rgba(49, 55, 47, 0.12);
      background: rgba(214, 220, 210, 0.62);
    }

    .calendar-title {
      color: var(--ink);
      font-weight: 900;
      text-transform: none;
    }

    .icon-button {
      display: inline-grid;
      width: 2.45rem;
      height: 2.45rem;
      place-items: center;
      color: var(--ink-soft);
      border: 1px solid rgba(49, 55, 47, 0.16);
      border-radius: 12px;
      background: rgba(237, 241, 233, 0.62);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.35rem;
      padding: 0.85rem;
    }

    .weekday,
    .day-button {
      display: grid;
      min-height: 2.45rem;
      place-items: center;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 900;
    }

    .weekday {
      color: #737b70;
      text-transform: uppercase;
    }

    .day-button {
      color: var(--ink-soft);
      border: 1px solid transparent;
      background: transparent;
    }

    .day-button.available {
      color: #20271e;
      border-color: rgba(50, 58, 47, 0.12);
      background: rgba(238, 241, 234, 0.7);
    }

    .day-button.selected,
    .day-button.available:hover {
      color: var(--lime);
      border-color: rgba(200, 255, 0, 0.54);
      background: var(--carbon);
      box-shadow: 0 8px 20px rgba(17, 20, 17, 0.18), 0 0 0 4px rgba(200, 255, 0, 0.07);
    }

    .day-button.disabled {
      color: rgba(70, 77, 65, 0.45);
    }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.65rem;
    }

    .time-button {
      min-height: 3.15rem;
      color: var(--ink-soft);
      border: 1px solid rgba(50, 58, 47, 0.16);
      border-radius: 14px;
      background: rgba(238, 241, 234, 0.7);
      font-weight: 900;
    }

    .time-button:hover,
    .time-button.selected {
      color: var(--lime);
      border-color: rgba(200, 255, 0, 0.54);
      background: var(--carbon);
      box-shadow: 0 8px 20px rgba(17, 20, 17, 0.18), 0 0 0 4px rgba(200, 255, 0, 0.07);
    }

    .time-button.busy {
      color: rgba(70, 77, 65, 0.36);
      border-color: rgba(73, 80, 68, 0.14);
      background: rgba(168, 174, 162, 0.48);
      text-decoration: line-through;
    }

    .summary-list {
      display: grid;
      gap: 0.7rem;
      padding: 0;
      margin: 0.3rem 0 0;
      list-style: none;
    }

    .summary-list li {
      display: flex;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem;
      border: 1px solid rgba(49, 55, 47, 0.11);
      border-radius: 14px;
      background: rgba(238, 241, 234, 0.68);
    }

    .summary-list span {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 750;
    }

    .summary-list strong {
      color: var(--ink);
      text-align: right;
    }

    .appointments-list,
    .admin-list {
      display: grid;
      gap: 0.75rem;
      margin-top: 0.35rem;
    }

    .appointment-card {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.85rem;
      align-items: center;
      padding: 0.85rem;
      border: 1px solid rgba(49, 55, 47, 0.11);
      border-radius: 16px;
      background: rgba(238, 241, 234, 0.68);
    }

    .admin-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.7rem;
    }

    .danger-button {
      min-height: auto;
      padding: 0;
      color: #3c1616;
      border: 0;
      background: transparent;
      font-size: 0.82rem;
      box-shadow: none;
    }

    .danger-button:hover {
      color: #6a1e1e;
      background: transparent;
      transform: none;
    }

    .admin-login-card {
      min-height: min(38rem, calc(100vh - 2rem));
      align-content: center;
      text-align: center;
    }

    .admin-login-logo {
      width: min(120px, 34vw);
      margin: 0 auto 0.4rem;
    }

    .admin-login-form {
      display: grid;
      gap: 0.9rem;
      margin-top: 0.4rem;
    }

    .admin-error {
      min-height: 1.2rem;
      margin: 0;
      color: #5c1c1c;
      font-size: 0.86rem;
      font-weight: 800;
    }

    .date-badge {
      display: grid;
      width: 4.2rem;
      min-height: 4.2rem;
      place-items: center;
      color: var(--lime);
      border-radius: 14px;
      background: var(--carbon);
      border: 1px solid rgba(200, 255, 0, 0.42);
      text-align: center;
      font-weight: 900;
      line-height: 1.1;
    }

    .date-badge small {
      font-size: 0.68rem;
      text-transform: uppercase;
    }

    .empty-state {
      padding: 1.1rem;
      color: var(--muted);
      border: 1px dashed rgba(49, 55, 47, 0.2);
      border-radius: 16px;
      background: rgba(238, 241, 234, 0.5);
      text-align: center;
    }

    @media (max-width: 620px) {
      html,
      body {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }

      .app {
        padding: 0.75rem;
        align-items: stretch;
      }

      .screen {
        width: 100%;
      }

      .login-card,
      .step-card,
      .success-card,
      .admin-card {
        min-height: calc(100dvh - 1.5rem);
        border-radius: 20px;
        padding: 1rem;
      }

      .time-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .progress-item {
        font-size: 0.6rem;
      }

      .brand-logo {
        width: min(132px, 42vw);
      }

      .brand-title {
        font-size: clamp(2rem, 12vw, 3rem);
      }

      .brand-subtitle {
        font-size: clamp(1rem, 5vw, 1.35rem);
      }

      .hero-title,
      .admin-login-card h1 {
        font-size: clamp(1.9rem, 7.6vw, 2.32rem);
      }

      .calendar-grid {
        gap: 0.28rem;
        padding: 0.62rem;
      }

      .weekday,
      .day-button {
        min-height: 2.18rem;
        border-radius: 10px;
      }

      .summary-list li {
        display: grid;
        gap: 0.2rem;
        align-items: start;
      }

      .summary-list strong {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="screen" id="loginScreen">
      <div class="card login-card">
        <div class="logo-wrap">
          <img class="brand-logo admin-trigger" id="adminLogoButton" src="assets/logop1veiculos.png" alt="Logo P1 Auto Recife" role="button" tabindex="0">
          <div>
            <h1 class="brand-title">P1</h1>
            <p class="brand-subtitle">Auto Recife</p>
          </div>
        </div>
        <div>
          <h1 class="hero-title">O carro que você quer pode estar te esperando</h1>
          <p class="lead">Reserve sua visita à P1 Auto Recife.</p>
        </div>
        <form id="loginForm">
          <div class="field">
            <label for="clientNameInput">Me informa seu nome e sobrenome</label>
            <div class="input-wrap">
              <input id="clientNameInput" autocomplete="name" placeholder="Digite seu nome" required>
            </div>
          </div>
          <button class="button button-primary" type="submit" style="width: 100%; margin-top: 1rem;">
            <i data-lucide="log-in"></i>
            Entrar
          </button>
        </form>
      </div>
    </section>

    <section class="screen hidden" id="bookingScreen">
      <div class="card step-card">
        <div class="top-actions">
          <div>
            <div class="section-brand">
              <img class="section-logo" src="assets/logop1veiculos.png" alt="">
              <span>P1 Auto Recife</span>
            </div>
            <h1 id="stepTitle">Escolha o dia da visita</h1>
          </div>
        </div>
        <div class="progress" id="progress"></div>
        <div id="stepContent"></div>
      </div>
    </section>

    <section class="screen hidden" id="appointmentsScreen">
      <div class="card step-card">
        <div class="top-actions">
          <div>
            <div class="section-brand">
              <img class="section-logo" src="assets/logop1veiculos.png" alt="">
              <span>P1 Auto Recife</span>
            </div>
            <h1>Minhas visitas</h1>
          </div>
          <button class="button button-soft" type="button" data-go="calendar">
            <i data-lucide="arrow-left"></i>
            Voltar
          </button>
        </div>
        <div class="appointments-list" id="appointmentsList"></div>
      </div>
    </section>

    <section class="screen hidden" id="adminScreen">
      <div class="card admin-card">
        <div class="top-actions">
          <div>
            <div class="section-brand">
              <img class="section-logo" src="assets/logop1veiculos.png" alt="">
              <span>Painel P1</span>
            </div>
            <h1>Agenda da loja</h1>
          </div>
          <button class="button button-soft" type="button" data-go="login">
            <i data-lucide="arrow-left"></i>
            Voltar
          </button>
        </div>
        <div class="admin-list" id="adminList"></div>
      </div>
    </section>

    <section class="screen hidden" id="adminLoginScreen">
      <div class="card login-card admin-login-card">
        <img class="brand-logo admin-login-logo" src="assets/logop1veiculos.png" alt="Logo P1 Auto Recife">
        <div>
          <p class="section-brand" style="justify-content: center;">Acesso reservado</p>
          <h1>Painel da loja</h1>
          <p class="lead">Digite o PIN para acompanhar e organizar as visitas agendadas.</p>
        </div>
        <form class="admin-login-form" id="adminLoginForm">
          <div class="field">
            <label for="adminPinInput">PIN de acesso</label>
            <input id="adminPinInput" inputmode="numeric" autocomplete="off" type="password" placeholder="Digite o PIN" required>
          </div>
          <p class="admin-error" id="adminLoginError"></p>
          <button class="button button-primary" type="submit">
            <i data-lucide="lock-keyhole-open"></i>
            Entrar no painel
          </button>
          <button class="button button-soft" type="button" data-go="login">
            Voltar
          </button>
        </form>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import {
      addDoc,
      collection,
      deleteDoc,
      doc,
      getDocs,
      getFirestore,
      query,
      serverTimestamp,
      where
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const clientKey = "p1Agenda_clientName";
    const appointmentKey = "p1Agenda_appointments";
    const adminPin = "1234";
    const firebaseConfig = {
      apiKey: "AIzaSyAdYi5G-PhDWzD9anZZL_76asUpcCzJg9Y",
      authDomain: "agendamentop1.firebaseapp.com",
      projectId: "agendamentop1",
      storageBucket: "agendamentop1.firebasestorage.app",
      messagingSenderId: "105298128598",
      appId: "1:105298128598:web:06f19fb3e6eaa2c44d2377"
    };
    const firebaseReady = !Object.values(firebaseConfig).some(value => value.includes("COLE_"));
    const firebaseApp = firebaseReady ? initializeApp(firebaseConfig) : null;
    const firestoreDb = firebaseReady ? getFirestore(firebaseApp) : null;
    const appointmentsCollection = "p1_appointments";

    const times = [
      "08:30", "09:00", "09:30", "10:00", "10:30", "11:00",
      "11:30", "13:30", "14:00", "14:30", "15:00", "15:30",
      "16:00", "16:30", "17:00", "17:30"
    ];

    const state = {
      clientName: "",
      step: 1,
      date: "",
      time: "",
      calendar: new Date(),
      occupied: new Set()
    };

    const loginScreen = document.querySelector("#loginScreen");
    const bookingScreen = document.querySelector("#bookingScreen");
    const appointmentsScreen = document.querySelector("#appointmentsScreen");
    const adminScreen = document.querySelector("#adminScreen");
    const adminLoginScreen = document.querySelector("#adminLoginScreen");
    const loginForm = document.querySelector("#loginForm");
    const adminLoginForm = document.querySelector("#adminLoginForm");
    const adminPinInput = document.querySelector("#adminPinInput");
    const adminLoginError = document.querySelector("#adminLoginError");
    const adminLogoButton = document.querySelector("#adminLogoButton");
    const clientNameInput = document.querySelector("#clientNameInput");
    const stepTitle = document.querySelector("#stepTitle");
    const progress = document.querySelector("#progress");
    const stepContent = document.querySelector("#stepContent");
    const appointmentsList = document.querySelector("#appointmentsList");
    const adminList = document.querySelector("#adminList");

    clientNameInput.value = localStorage.getItem(clientKey) || "";

    function refreshIcons() {
      if (window.lucide) {
        window.lucide.createIcons();
      }
    }

    function dateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function fromDateKey(value) {
      const parts = value.split("-").map(Number);
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function friendlyDate(value) {
      return fromDateKey(value).toLocaleDateString("pt-BR", {
        weekday: "long",
        day: "2-digit",
        month: "long"
      });
    }

    function firstName(name) {
      return name.trim().split(/\s+/)[0] || name;
    }

    function shortDate(value) {
      const date = fromDateKey(value);
      return {
        day: String(date.getDate()).padStart(2, "0"),
        month: date.toLocaleDateString("pt-BR", { month: "short" }).replace(".", "").toUpperCase()
      };
    }

    function isPastDate(date) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = new Date(date);
      target.setHours(0, 0, 0, 0);
      return target < today;
    }

    function isWorkingDay(date) {
      const day = date.getDay();
      return day >= 1 && day <= 6;
    }

    function isPastTime(day, time) {
      const parts = time.split(":").map(Number);
      const target = fromDateKey(day);
      target.setHours(parts[0], parts[1], 0, 0);
      return target < new Date();
    }

    function readLocalAppointments() {
      try {
        return JSON.parse(localStorage.getItem(appointmentKey) || "[]").map(normalizeAppointment);
      } catch {
        return [];
      }
    }

    function writeLocalAppointments(items) {
      localStorage.setItem(appointmentKey, JSON.stringify(items));
    }

    function normalizeAppointment(item) {
      return {
        id: item.id,
        clientName: item.clientName,
        date: item.date,
        time: item.time,
        status: item.status || "confirmado",
        createdAt: item.createdAt || item.created_at || item.createdAt
      };
    }

    async function readAppointments() {
      if (!firestoreDb) {
        return readLocalAppointments();
      }

      try {
        const snapshot = await getDocs(collection(firestoreDb, appointmentsCollection));

        return snapshot.docs
          .map(doc => normalizeAppointment({ id: doc.id, ...doc.data() }))
          .sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));
      } catch (error) {
        console.error("Erro ao buscar agendamentos no Firebase:", error);
        return readLocalAppointments();
      }
    }

    async function createAppointment(item) {
      if (!firestoreDb) {
        const items = readLocalAppointments();
        items.push(item);
        writeLocalAppointments(items);
        return item;
      }

      try {
        const conflict = await getDocs(query(
          collection(firestoreDb, appointmentsCollection),
          where("date", "==", item.date),
          where("time", "==", item.time),
          where("status", "==", "confirmado")
        ));

        if (!conflict.empty) {
          alert("Esse horário acabou de ser reservado. Escolha outro horário para continuar.");
          throw new Error("Horário indisponível");
        }

        const docRef = await addDoc(collection(firestoreDb, appointmentsCollection), {
          clientName: item.clientName,
          date: item.date,
          time: item.time,
          status: item.status,
          createdAt: serverTimestamp()
        });

        return { ...item, id: docRef.id };
      } catch (error) {
        console.error("Erro ao salvar agendamento no Firebase:", error);
        if (error.message !== "Horário indisponível") {
          alert("Não foi possível salvar esse agendamento agora. Tente novamente em alguns instantes.");
        }
        throw error;
      }
    }

    async function deleteAppointment(id) {
      if (!firestoreDb) {
        const items = readLocalAppointments().filter(item => item.id !== id);
        writeLocalAppointments(items);
        return;
      }

      await deleteDoc(doc(firestoreDb, appointmentsCollection, id));
    }

    function showOnly(screen) {
      [loginScreen, bookingScreen, appointmentsScreen, adminScreen, adminLoginScreen].forEach(item => item.classList.add("hidden"));
      screen.classList.remove("hidden");
      refreshIcons();
    }

    function renderProgress() {
      const labels = ["Dia", "Horário", "Confirmação"];
      progress.innerHTML = labels.map((label, index) => {
        const number = index + 1;
        const active = number === state.step ? "active" : number < state.step ? "done" : "";
        return `<div class="progress-item ${active}"><span>${number}</span>${label}</div>`;
      }).join("");
    }

    async function renderStep() {
      showOnly(bookingScreen);
      renderProgress();

      if (state.step === 1) {
        renderCalendar();
      }

      if (state.step === 2) {
        await renderTimes();
      }

      if (state.step === 3) {
        renderConfirmation();
      }

      refreshIcons();
    }

    function renderCalendar() {
      stepTitle.textContent = "Escolha seu dia";
      const current = new Date(state.calendar.getFullYear(), state.calendar.getMonth(), 1);
      const firstWeekday = current.getDay();
      const days = new Date(current.getFullYear(), current.getMonth() + 1, 0).getDate();
      const cells = [];

      for (let index = 0; index < firstWeekday; index += 1) {
        cells.push(`<span class="day-button disabled"></span>`);
      }

      for (let day = 1; day <= days; day += 1) {
        const date = new Date(current.getFullYear(), current.getMonth(), day);
        const key = dateKey(date);
        const available = !isPastDate(date) && isWorkingDay(date);
        const selected = state.date === key;
        cells.push(`
          <button class="day-button ${available ? "available" : "disabled"} ${selected ? "selected" : ""}" type="button" ${available ? "" : "disabled"} data-day="${key}">
            ${day}
          </button>
        `);
      }

      stepContent.innerHTML = `
        <p class="lead" style="margin-bottom: 1rem;">Olá ${firstName(state.clientName)}! Vamos reservar o melhor dia para sua visita.</p>
        <div class="calendar-box">
          <div class="calendar-head">
            <button class="icon-button" type="button" data-month="-1" aria-label="Mês anterior"><i data-lucide="chevron-left"></i></button>
            <strong class="calendar-title">${current.toLocaleDateString("pt-BR", { month: "long", year: "numeric" })}</strong>
            <button class="icon-button" type="button" data-month="1" aria-label="Próximo mês"><i data-lucide="chevron-right"></i></button>
          </div>
          <div class="calendar-grid">
            ${["D", "S", "T", "Q", "Q", "S", "S"].map(day => `<span class="weekday">${day}</span>`).join("")}
            ${cells.join("")}
          </div>
        </div>
        <button class="button button-soft" type="button" data-view-appointments style="width: 100%; margin-top: 1rem;">
          <i data-lucide="calendar-days"></i>
          Ver minhas visitas
        </button>
      `;

      stepContent.querySelectorAll("[data-month]").forEach(button => {
        button.addEventListener("click", () => {
          state.calendar = new Date(state.calendar.getFullYear(), state.calendar.getMonth() + Number(button.dataset.month), 1);
          renderStep();
        });
      });

      stepContent.querySelectorAll("[data-day]").forEach(button => {
        button.addEventListener("click", () => {
          state.date = button.dataset.day;
          state.step = 2;
          renderStep();
        });
      });
    }

    async function loadOccupiedTimes() {
      const items = await readAppointments();
      state.occupied = new Set(items.filter(item => item.date === state.date && item.status !== "cancelado").map(item => item.time));
    }

    async function renderTimes() {
      stepTitle.textContent = "Escolha seu horário";
      await loadOccupiedTimes();
      stepContent.innerHTML = `
        <p class="lead" style="margin-bottom: 1rem;">Vamos separar esse momento para te receber com calma.</p>
        <div class="time-grid">
          ${times.map(time => {
            const busy = state.occupied.has(time) || isPastTime(state.date, time);
            const selected = state.time === time;
            return `<button class="time-button ${busy ? "busy" : ""} ${selected ? "selected" : ""}" type="button" ${busy ? "disabled" : ""} data-time="${time}">${time}</button>`;
          }).join("")}
        </div>
        <button class="button button-soft" type="button" data-back="1" style="width: 100%; margin-top: 1rem;">
          <i data-lucide="arrow-left"></i>
          Voltar para o dia
        </button>
      `;

      stepContent.querySelectorAll("[data-time]").forEach(button => {
        button.addEventListener("click", () => {
          state.time = button.dataset.time;
          state.step = 3;
          renderStep();
        });
      });
    }

    function renderConfirmation() {
      stepTitle.textContent = "Sua visita está quase reservada";
      stepContent.innerHTML = `
        <p class="lead" style="margin-bottom: 1rem;">Confira os detalhes e deixe sua visita reservada.</p>
        <ul class="summary-list">
          <li><span>Cliente</span><strong>${firstName(state.clientName)}</strong></li>
          <li><span>Data</span><strong>${friendlyDate(state.date)}</strong></li>
          <li><span>Horário</span><strong>${state.time}</strong></li>
          <li><span>Local</span><strong>Av. Visconde de Albuquerque, 422</strong></li>
        </ul>
        <button class="button button-primary" type="button" data-confirm style="width: 100%; margin-top: 1rem;">
          <i data-lucide="check"></i>
          Confirmar minha visita
        </button>
        <button class="button button-soft" type="button" data-back="2" style="width: 100%; margin-top: 0.7rem;">
          <i data-lucide="arrow-left"></i>
          Voltar para horário
        </button>
      `;
    }

    async function confirmAppointment() {
      await loadOccupiedTimes();

      if (state.occupied.has(state.time)) {
        state.step = 3;
        renderStep();
        return;
      }

      try {
        await createAppointment({
          id: crypto.randomUUID(),
          clientName: state.clientName,
          date: state.date,
          time: state.time,
          status: "confirmado",
          createdAt: new Date().toISOString()
        });
        renderSuccess();
      } catch {
        state.step = 2;
        renderStep();
      }
    }

    function renderSuccess() {
      progress.innerHTML = ["Dia", "Horário", "Confirmação"].map((label, index) => `<div class="progress-item done"><span>${index + 1}</span>${label}</div>`).join("");
      stepTitle.textContent = "Visita reservada";
      stepContent.innerHTML = `
        <p class="lead" style="margin-bottom: 1rem;">Tudo certo, ${firstName(state.clientName)}! Agora falta pouco para conhecer de perto as oportunidades da P1.</p>
        <ul class="summary-list">
          <li><span>Cliente</span><strong>${firstName(state.clientName)}</strong></li>
          <li><span>Data</span><strong>${friendlyDate(state.date)}</strong></li>
          <li><span>Horário</span><strong>${state.time}</strong></li>
        </ul>
        <button class="button button-primary" type="button" data-new style="width: 100%; margin-top: 1rem;">
          <i data-lucide="calendar-plus"></i>
          Refazer Agendamento
        </button>
      `;
      refreshIcons();
    }

    async function renderAppointments() {
      showOnly(appointmentsScreen);
      const today = dateKey(new Date());
      const items = (await readAppointments())
        .filter(item => item.clientName.toLowerCase() === state.clientName.toLowerCase() && item.date >= today)
        .sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));

      if (!items.length) {
        appointmentsList.innerHTML = `<div class="empty-state">Você ainda não possui visitas marcadas.</div>`;
        return;
      }

      appointmentsList.innerHTML = items.map(item => {
        const date = shortDate(item.date);
        return `
          <article class="appointment-card">
            <div class="date-badge">${date.day}<small>${date.month}</small></div>
            <div>
              <strong>${item.time}</strong>
              <p style="margin: 0.25rem 0 0; color: #596254;">${friendlyDate(item.date)}</p>
            </div>
          </article>
        `;
      }).join("");
      refreshIcons();
    }

    async function renderAdmin() {
      showOnly(adminScreen);
      const items = (await readAppointments()).sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));

      if (!items.length) {
        adminList.innerHTML = `<div class="empty-state">Nenhuma visita marcada ainda.</div>`;
        return;
      }

      adminList.innerHTML = items.map(item => {
        const date = shortDate(item.date);
        return `
          <article class="appointment-card">
            <div class="date-badge">${date.day}<small>${date.month}</small></div>
            <div>
              <strong>${item.time}, ${item.clientName}</strong>
              <p style="margin: 0.25rem 0 0; color: #596254;">${friendlyDate(item.date)}</p>
              <div class="admin-actions">
                <button class="button danger-button" type="button" data-delete-appointment="${item.id}">
                  <i data-lucide="trash-2"></i>
                  Excluir reserva
                </button>
              </div>
            </div>
          </article>
        `;
      }).join("");
      refreshIcons();
    }

    loginForm.addEventListener("submit", event => {
      event.preventDefault();
      const name = clientNameInput.value.trim();
      if (!name) {
        return;
      }

      state.clientName = name;
      localStorage.setItem(clientKey, name);
      state.step = 1;
      state.date = "";
      state.time = "";
      renderStep();
    });

    adminLogoButton.addEventListener("click", () => {
      adminPinInput.value = "";
      adminLoginError.textContent = "";
      showOnly(adminLoginScreen);
      adminPinInput.focus();
    });

    adminLogoButton.addEventListener("keydown", event => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        adminLogoButton.click();
      }
    });

    adminLoginForm.addEventListener("submit", event => {
      event.preventDefault();

      if (adminPinInput.value.trim() !== adminPin) {
        adminLoginError.textContent = "PIN incorreto. Tente novamente.";
        adminPinInput.select();
        return;
      }

      adminLoginError.textContent = "";
      renderAdmin();
    });

    stepContent.addEventListener("click", event => {
      const back = event.target.closest("[data-back]");
      const confirm = event.target.closest("[data-confirm]");
      const viewAppointments = event.target.closest("[data-view-appointments]");
      const newButton = event.target.closest("[data-new]");

      if (back) {
        state.step = Number(back.dataset.back);
        renderStep();
      }

      if (confirm) {
        confirmAppointment();
      }

      if (viewAppointments) {
        renderAppointments();
      }

      if (newButton) {
        state.step = 1;
        state.date = "";
        state.time = "";
        renderStep();
      }
    });

    document.addEventListener("click", event => {
      const deleteButton = event.target.closest("[data-delete-appointment]");
      if (deleteButton) {
        const confirmed = confirm("Excluir esta reserva da agenda?");
        if (!confirmed) {
          return;
        }

        deleteAppointment(deleteButton.dataset.deleteAppointment)
          .then(renderAdmin)
          .catch(error => {
            console.error("Erro ao excluir reserva:", error);
            alert("Não foi possível excluir esta reserva agora.");
          });
        return;
      }

      const go = event.target.closest("[data-go]");
      if (!go) {
        return;
      }

      if (go.dataset.go === "login") {
        showOnly(loginScreen);
      }

      if (go.dataset.go === "calendar") {
        state.step = 1;
        renderStep();
      }
    });

    showOnly(loginScreen);
    refreshIcons();
  </script>
</body>
</html>
